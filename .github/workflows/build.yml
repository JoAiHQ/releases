name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.19.0)'
        required: true
      sha:
        description: 'Commit SHA to build'
        required: true

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Desktop — Tauri (macOS ARM/Intel, Linux, Windows)
  # ──────────────────────────────────────────────────────
  publish-tauri:
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      NODE_OPTIONS: --max-old-space-size=6144
      NEXT_TELEMETRY_DISABLED: '1'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            args: '--target aarch64-apple-darwin --bundles app,dmg'
            rust_targets: 'aarch64-apple-darwin'
          - runner: macos-15-intel
            args: '--target x86_64-apple-darwin --bundles app'
            rust_targets: 'x86_64-apple-darwin'
          - runner: ubuntu-22.04
            args: '--bundles appimage'
            rust_targets: ''
          - runner: windows-latest
            args: '--bundles nsis'
            rust_targets: ''

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: JoAiHQ/pwa
          token: ${{ secrets.JOAI_GITHUB_TOKEN }}
          ref: ${{ inputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install dependencies (ubuntu only)
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Refresh static cache expiry
        run: node scripts/refresh-manifest-expiry.js

      - name: Import Apple Developer ID certificate
        if: startsWith(matrix.runner, 'macos-')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Setup Apple notarization
        if: startsWith(matrix.runner, 'macos-')
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.FASTLANE_APPLE_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey.p8

      - name: Set Apple signing env vars
        if: startsWith(matrix.runner, 'macos-')
        run: |
          echo "APPLE_SIGNING_IDENTITY=Developer ID Application: vLeap e.U. (SY59U6Q75Y)" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=b7a5eb53-8cf6-4fd4-a4ce-20e375962c2e" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=QK38U528RU" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.JOAI_GITHUB_TOKEN }}
          NEXT_PUBLIC_ENV: mainnet
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.version }}
          releaseName: 'JoAi ${{ inputs.version }}'
          releaseBody: 'Release notes: https://joai.ai/changelog'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ──────────────────────────────────────────────────────
  # iOS — TestFlight
  # ──────────────────────────────────────────────────────
  publish-ios:
    timeout-minutes: 45
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4
        with:
          repository: JoAiHQ/pwa
          token: ${{ secrets.JOAI_GITHUB_TOKEN }}
          ref: ${{ inputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: .

      - name: Build web app
        run: npm run build && npm run build:app
        working-directory: .
        env:
          NEXT_PUBLIC_ENV: mainnet
          GITHUB_TOKEN: ${{ secrets.JOAI_GITHUB_TOKEN }}
          SKIP_INDEXNOW: '1'
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Strip SEO pages from mobile bundle
        run: |
          # Mobile app uses top-level routes (/login, /office, etc.)
          # Locale dirs are only for SEO marketing pages — safe to remove
          rm -rf out/en out/de
          # Remove SEO-only top-level dirs
          SEO_DIRS="about ai-demo alternatives answers best chains changelog contact ecosystem security use-cases wallets"
          for dir in $SEO_DIRS; do
            rm -rf "out/$dir"
          done
        working-directory: .

      - name: Load CI config
        run: |
          set -a
          source ../.env.ci
          set +a
          echo "FASTLANE_APPLE_API_KEY_ID=$FASTLANE_APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "FASTLANE_APPLE_API_ISSUER_ID=$FASTLANE_APPLE_API_ISSUER_ID" >> "$GITHUB_ENV"
          echo "FASTLANE_TEAM_ID=$FASTLANE_TEAM_ID" >> "$GITHUB_ENV"
          echo "MATCH_GIT_URL=$MATCH_GIT_URL" >> "$GITHUB_ENV"

      - name: Decode App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.FASTLANE_APPLE_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey.p8
          echo "FASTLANE_APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Setup SSH for Match
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_GIT_PRIVATE_KEY }}" > ~/.ssh/match_key
          chmod 600 ~/.ssh/match_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          printf 'Host github.com\n  IdentityFile ~/.ssh/match_key\n  IdentitiesOnly yes\n' >> ~/.ssh/config

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: ios

      - name: Build & upload to TestFlight
        env:
          SKIP_BUILD: 'true'
          MATCH_READONLY: 'false'
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          NEXT_PUBLIC_ENV: mainnet
        run: bundle exec fastlane beta

      - name: Collect iOS size
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          IPA=$(find . -name "*.ipa" 2>/dev/null | head -1)
          IPA_BYTES=0
          if [ -n "$IPA" ]; then
            IPA_BYTES=$(wc -c < "$IPA")
          fi
          echo "{\"ipa_bytes\": $IPA_BYTES}" > /tmp/size-ios.json

      - name: Upload iOS size artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: size-ios
          path: /tmp/size-ios.json
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # Android — Play Store (internal testing)
  # ──────────────────────────────────────────────────────
  publish-android:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          repository: JoAiHQ/pwa
          token: ${{ secrets.JOAI_GITHUB_TOKEN }}
          ref: ${{ inputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: .

      - name: Build web app
        run: npm run build && npm run build:app
        working-directory: .
        env:
          NEXT_PUBLIC_ENV: mainnet
          GITHUB_TOKEN: ${{ secrets.JOAI_GITHUB_TOKEN }}
          SKIP_INDEXNOW: '1'
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Strip SEO pages from mobile bundle
        run: |
          # Mobile app uses top-level routes (/login, /office, etc.)
          # Locale dirs are only for SEO marketing pages — safe to remove
          rm -rf out/en out/de
          # Remove SEO-only top-level dirs
          SEO_DIRS="about ai-demo alternatives answers best chains changelog contact ecosystem security use-cases wallets"
          for dir in $SEO_DIRS; do
            rm -rf "out/$dir"
          done
        working-directory: .

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Load CI config
        run: |
          set -a
          source ../.env.ci
          set +a
          echo "ANDROID_RELEASE_KEY_ALIAS=$ANDROID_RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ~/release.keystore
          echo "ANDROID_RELEASE_STORE_FILE=$HOME/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Decode Google Play service account key
        run: |
          echo "${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}" | base64 --decode > ~/google-play-key.json
          echo "GOOGLE_PLAY_JSON_KEY_FILE=$HOME/google-play-key.json" >> "$GITHUB_ENV"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: android

      - name: Create Capacitor assets dir
        run: mkdir -p app/src/main/assets

      - name: Build & upload to Play Store internal testing
        env:
          SKIP_BUILD: 'true'
          NEXT_PUBLIC_ENV: mainnet
        run: bundle exec fastlane internal

      - name: Collect Android & web bundle sizes
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 << 'PYEOF'
          import json, os, glob, subprocess

          def dir_bytes(path):
              if not os.path.exists(path):
                  return 0
              r = subprocess.run(['du', '-sb', path], capture_output=True, text=True)
              return int(r.stdout.split()[0]) if r.returncode == 0 else 0

          stats = {}

          # Web bundle (out/ persists after cap sync)
          if os.path.exists('out'):
              stats['out_total_bytes']  = dir_bytes('out')
              stats['static_bytes']     = dir_bytes('out/_next/static')
              stats['chunks_bytes']     = dir_bytes('out/_next/static/chunks')
              stats['media_bytes']      = dir_bytes('out/_next/static/media')
              stats['css_bytes']        = dir_bytes('out/_next/static/css')

              # Compressed estimate
              r = subprocess.run('tar -czf - out/ | wc -c', shell=True, capture_output=True, text=True)
              stats['compressed_bytes'] = int(r.stdout.strip()) if r.returncode == 0 else 0

              # Top 20 JS chunks by size
              chunks = [
                  {'file': os.path.basename(f), 'bytes': os.path.getsize(f)}
                  for f in glob.glob('out/_next/static/chunks/**/*.js', recursive=True)
              ]
              chunks.sort(key=lambda x: x['bytes'], reverse=True)
              stats['top_chunks'] = chunks[:20]

              # Media breakdown by extension
              media = {}
              for f in glob.glob('out/_next/static/media/**/*', recursive=True):
                  if not os.path.isfile(f):
                      continue
                  ext = f.rsplit('.', 1)[-1].lower() if '.' in f else 'other'
                  if ext not in media:
                      media[ext] = {'count': 0, 'bytes': 0}
                  media[ext]['count'] += 1
                  media[ext]['bytes'] += os.path.getsize(f)
              stats['media_by_ext'] = media

              # Top-level app routes (post-strip)
              routes = {}
              for item in os.listdir('out'):
                  path = f'out/{item}'
                  if os.path.isdir(path) and not item.startswith('_'):
                      routes[item] = dir_bytes(path)
              stats['routes'] = dict(sorted(routes.items(), key=lambda x: x[1], reverse=True)[:25])

          # AAB
          aab = 'android/app/build/outputs/bundle/release/app-release.aab'
          stats['aab_bytes'] = os.path.getsize(aab) if os.path.exists(aab) else 0

          with open('/tmp/size-android.json', 'w') as f:
              json.dump(stats, f)

          print(f"Collected: {list(stats.keys())}")
          PYEOF

      - name: Upload Android size artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: size-android
          path: /tmp/size-android.json
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # Bundle Size Report — assembled after all platform jobs
  # ──────────────────────────────────────────────────────
  bundle-report:
    name: Bundle Size Report
    needs: [publish-tauri, publish-ios, publish-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download platform size artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: size-*
          path: /tmp/sizes
          merge-multiple: true
        continue-on-error: true

      - name: Download desktop release artifacts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.JOAI_GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/desktop
          for i in 1 2 3; do
            gh release download "${{ inputs.version }}" \
              --repo JoAiHQ/releases \
              --dir /tmp/desktop 2>/dev/null && break
            echo "Retry $i..."
            sleep 15
          done

      - name: Generate report
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 << 'PYEOF'
          import json, os, glob, datetime

          version = os.environ.get('VERSION', 'unknown')
          now = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          def fmt(b):
              b = int(b or 0)
              if b == 0: return '—'
              if b >= 1024**3: return f'{b/1024**3:.1f} GB'
              if b >= 1024**2: return f'{b/1024**2:.1f} MB'
              if b >= 1024: return f'{b/1024:.1f} KB'
              return f'{b} B'

          def load(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except Exception:
                  return {}

          android = load('/tmp/sizes/size-android.json')
          ios     = load('/tmp/sizes/size-ios.json')

          # Desktop artifacts from GitHub release (skip signatures, update manifests)
          SKIP_SUFFIXES = ('.sig', '.tar.gz.sig', 'latest.json', 'update.json')
          SHOW_SUFFIXES = ('.dmg', '.exe', '.msi', '.AppImage', '.app.tar.gz', '.deb', '.rpm')
          desktop = {}
          for fname in sorted(os.listdir('/tmp/desktop')):
              path = f'/tmp/desktop/{fname}'
              if not os.path.isfile(path): continue
              if any(fname.endswith(s) for s in SKIP_SUFFIXES): continue
              if any(fname.endswith(s) for s in SHOW_SUFFIXES):
                  desktop[fname] = os.path.getsize(path)

          lines = []
          lines += [
              f'# JoAi Bundle Size Report — {version}',
              '',
              f'Generated: {now}',
              '',
          ]

          # ── Platform Artifacts ──────────────────────────────────
          lines += ['## Platform Artifacts', '']
          lines += ['| Platform | Artifact | Size | Notes |']
          lines += ['|----------|----------|------|-------|']

          aab_bytes = android.get('aab_bytes', 0)
          aab_mb    = aab_bytes / 1024**2 if aab_bytes else 0
          if aab_mb >= 200:
              aab_note = '🔴 Exceeds 200 MB Play Store limit'
          elif aab_mb >= 150:
              aab_note = '🟡 Approaching 200 MB limit'
          elif aab_bytes:
              aab_note = '🟢 OK'
          else:
              aab_note = 'Build failed or not found'
          lines.append(f'| Android | `app-release.aab` | {fmt(aab_bytes)} | {aab_note} |')

          ipa_bytes = ios.get('ipa_bytes', 0)
          lines.append(f'| iOS | `.ipa` | {fmt(ipa_bytes)} | Uploaded to TestFlight |')

          PLATFORM_MAP = [
              ('aarch64', '.dmg',       'macOS (ARM) DMG'),
              ('x64',     '.dmg',       'macOS (Intel) DMG'),
              ('aarch64', '.app.tar.gz','macOS (ARM) .app'),
              ('x64',     '.app.tar.gz','macOS (Intel) .app'),
              ('amd64',   '.AppImage',  'Linux AppImage'),
              ('x86_64',  '.AppImage',  'Linux AppImage'),
              ('',        '.exe',       'Windows NSIS'),
              ('',        '.msi',       'Windows MSI'),
          ]
          matched = set()
          for arch, suffix, label in PLATFORM_MAP:
              for fname, size in desktop.items():
                  if fname in matched: continue
                  if fname.endswith(suffix) and (not arch or arch in fname):
                      lines.append(f'| {label} | `{fname}` | {fmt(size)} | — |')
                      matched.add(fname)

          # Any remaining unmatched desktop artifacts
          for fname, size in desktop.items():
              if fname not in matched:
                  lines.append(f'| Desktop | `{fname}` | {fmt(size)} | — |')

          lines.append('')

          # ── Web Bundle ─────────────────────────────────────────
          if android.get('out_total_bytes'):
              lines += [
                  '## Web Bundle (mobile — after SEO strip)',
                  '',
                  '_Analyzed from Android build. iOS uses the same bundle._',
                  '',
                  '| Path | Size |',
                  '|------|------|',
                  f'| `out/` total | {fmt(android.get("out_total_bytes"))} |',
                  f'| `_next/static/` | {fmt(android.get("static_bytes"))} |',
                  f'| `_next/static/chunks/` | {fmt(android.get("chunks_bytes"))} |',
                  f'| `_next/static/media/` | {fmt(android.get("media_bytes"))} |',
                  f'| `_next/static/css/` | {fmt(android.get("css_bytes"))} |',
                  '',
                  f'**Estimated gzip-compressed: ~{fmt(android.get("compressed_bytes"))}**',
                  '',
              ]

              # JS chunks
              top_chunks = android.get('top_chunks', [])
              if top_chunks:
                  lines += ['### Top JS Chunks', '', '| Size | File |', '|------|------|']
                  for c in top_chunks:
                      lines.append(f'| {fmt(c["bytes"])} | `{c["file"]}` |')
                  lines.append('')

              # Media
              media_by_ext = android.get('media_by_ext', {})
              if media_by_ext:
                  lines += ['### Media Files by Type', '', '| Extension | Files | Total Size |', '|-----------|-------|------------|']
                  for ext, d in sorted(media_by_ext.items(), key=lambda x: x[1]['bytes'], reverse=True):
                      lines.append(f'| `.{ext}` | {d["count"]} | {fmt(d["bytes"])} |')
                  lines.append('')

              # Routes
              routes = android.get('routes', {})
              if routes:
                  lines += ['### App Routes (post-strip)', '', '| Route | Size |', '|-------|------|']
                  for route, size in list(routes.items())[:25]:
                      lines.append(f'| `/{route}` | {fmt(size)} |')
                  lines.append('')

          report = '\n'.join(lines) + '\n'
          print(report)

          with open('bundle-size-report.md', 'w') as f:
              f.write(report)
          PYEOF

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report-${{ inputs.version }}
          path: bundle-size-report.md
          retention-days: 90

  # ──────────────────────────────────────────────────────
  # Homebrew — Update tap with macOS artifacts
  # ──────────────────────────────────────────────────────
  update-homebrew:
    timeout-minutes: 15
    needs: publish-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.version }}

      - name: Download macOS artifacts from release
        env:
          GH_TOKEN: ${{ secrets.JOAI_GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/artifacts
          # Retry download since tauri-action may still be finalizing the release
          for i in 1 2 3; do
            gh release download "${{ inputs.version }}" \
              --repo JoAiHQ/releases \
              --pattern "JoAi_aarch64.app.tar.gz" \
              --pattern "JoAi_x64.app.tar.gz" \
              --dir /tmp/artifacts && break
            echo "Retry $i..."
            sleep 30
          done

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "arm64=$(sha256sum /tmp/artifacts/JoAi_aarch64.app.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum /tmp/artifacts/JoAi_x64.app.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: JoAiHQ/homebrew-joai
          token: ${{ secrets.JOAI_GITHUB_TOKEN }}

      - name: Create release on tap repo
        env:
          GH_TOKEN: ${{ secrets.JOAI_GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --repo JoAiHQ/homebrew-joai --yes 2>/dev/null || true
          gh release create "v${{ steps.version.outputs.version }}" \
            --repo JoAiHQ/homebrew-joai \
            --title "JoAi v${{ steps.version.outputs.version }}" \
            --notes "Mirrored from JoAi v${{ steps.version.outputs.version }}" \
            /tmp/artifacts/JoAi_aarch64.app.tar.gz \
            /tmp/artifacts/JoAi_x64.app.tar.gz

      - name: Update cask formula
        run: |
          cat > Casks/joai.rb << 'RUBY'
          cask "joai" do
            version "${{ steps.version.outputs.version }}"

            on_arm do
              sha256 "${{ steps.hashes.outputs.arm64 }}"
              url "https://github.com/JoAiHQ/homebrew-joai/releases/download/v#{version}/JoAi_aarch64.app.tar.gz"
            end

            on_intel do
              sha256 "${{ steps.hashes.outputs.x64 }}"
              url "https://github.com/JoAiHQ/homebrew-joai/releases/download/v#{version}/JoAi_x64.app.tar.gz"
            end

            name "JoAi"
            desc "Desktop app for workspace management, file operations, and agent interactions"
            homepage "https://joai.ai"

            app "JoAi.app"

            zap trash: [
              "~/Library/Application Support/ai.joai.app",
              "~/Library/Caches/ai.joai.app",
              "~/Library/Preferences/ai.joai.app.plist",
              "~/.joai-cli",
            ]
          end
          RUBY
          sed -i 's/^          //' Casks/joai.rb

      - name: Commit and push updated cask
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/joai.rb
          git diff --cached --quiet || git commit -m "Update JoAi to v${{ steps.version.outputs.version }}"
          git push
